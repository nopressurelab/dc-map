<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trends & projections, Aragón Datacenter Map</title>

</head>
<body class="about-body" data-page="trends">
<header class="about-header">
  <div class="about-header-inner">
    <a href="index.html" class="back-link">← Back to map</a>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</header>

<main class="about-main">
  <div id="content"><p class="lede">Loading…</p></div>
  <noscript><p class="lede">This page's text is in <code>content/trends.en.md</code> / <code>content/trends.es.md</code>. Enable JavaScript, or read those files directly.</p></noscript>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<script>
(function () {

  // Palette (matches map)
  var C = {
    hyperscaler: '#1f6feb',
    pe: '#b87a00',
    colo: '#7e3fcf',
    ind: '#2da44e',
    renewable: '#1a8870',
    spec: '#cf222e',
    muted: '#8b949e',
    grid: '#d9dde2'
  };

  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif";
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#1a1f24';

  var data = null, rendered = false;
  function mkChart(id, cfg) { var el = document.getElementById(id); if (!el) return null; var old = Chart.getChart(el); if (old) old.destroy(); return new Chart(el, cfg); }
  function buildAll() {
    buildElectricityCharts(); buildWaterCharts(); buildSpeculativeCharts(data); buildInvestmentCharts(data);
    buildStatusCharts(data); buildHeatClusterCharts(); buildHeatRecordsCharts(); buildComparisonCharts();
    buildWasteHeatCharts(data); buildCoolingCharts(data); buildSummersDecadeCharts(); buildDroughtCharts(data);
    buildEmissionsCharts(data); buildLandCharts(data);
  }
  function tryBuild() { if (data && rendered) buildAll(); }
  window.onContentRender = function () { rendered = true; tryBuild(); };
  fetch('data/datacenters.json').then(function (r) { return r.json(); }).then(function (d) { data = d; tryBuild(); });

  // ---- 14. Land footprint by site ----
  function buildLandCharts(data) {
    var rows = data.sites.filter(function (s) { return s.land && s.land.hectares; })
      .map(function (s) { return { name: s.site_name.replace(/\s*\(.*$/, '').replace(/\s+—.*$/, ''), ha: s.land.hectares }; })
      .sort(function (a, b) { return b.ha - a.ha; });
    function build(locale) {
      return {
        type: 'bar',
        data: { labels: rows.map(function (r) { return r.name; }), datasets: [{ data: rows.map(function (r) { return r.ha; }), backgroundColor: C.pe, barPercentage: 0.75 }] },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          scales: { x: { title: { display: true, text: locale === 'es-ES' ? 'hectáreas' : 'hectares' }, beginAtZero: true } },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.x.toLocaleString(locale) + ' ha'; } } } }
        }
      };
    }
    mkChart('chart-land', build('en-US'));
    mkChart('chart-land-es', build('es-ES'));
  }

  // ---- 1. Electricity 2024 vs 2030 ----
  function buildElectricityCharts() {
    var cfg = function () {
      return {
        type: 'bar',
        data: {
          labels: ['2024', '2030 (projected)'],
          datasets: [
            {
              label: 'Datacenters',
              data: [1492, 20000], // 14% × 10659, 50% × 40000
              backgroundColor: C.spec,
              stack: 'x'
            },
            {
              label: 'Rest of Aragón',
              data: [10659 - 1492, 40000 - 20000],
              backgroundColor: C.grid,
              stack: 'x'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'x',
          scales: {
            x: { stacked: true },
            y: { stacked: true, title: { display: true, text: 'GWh / year' } }
          },
          plugins: { legend: { position: 'bottom' } }
        }
      };
    };
    mkChart('chart-electricity', cfg());
    var esCfg = cfg();
    esCfg.data.labels = ['2024', '2030 (proyectado)'];
    esCfg.data.datasets[0].label = 'Centros de datos';
    esCfg.data.datasets[1].label = 'Resto de Aragón';
    esCfg.options.scales.y.title.text = 'GWh / año';
    mkChart('chart-electricity-es', esCfg);
  }

  // ---- 2. Water: company vs critics ----
  // Custom Chart.js plugin: draws each bar's value above its top.
  var valueLabelPlugin = {
    id: 'valueLabelPlugin',
    afterDatasetsDraw: function (chart) {
      var ctx = chart.ctx;
      chart.data.datasets.forEach(function (dataset, i) {
        var meta = chart.getDatasetMeta(i);
        meta.data.forEach(function (bar, index) {
          var value = dataset.data[index];
          var label = chart.$labelFmt ? chart.$labelFmt(value) : value.toLocaleString();
          ctx.save();
          ctx.fillStyle = '#1a1f24';
          ctx.font = '600 12px -apple-system, "Segoe UI", Helvetica, Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(label, bar.x, bar.y - 6);
          ctx.restore();
        });
      });
    }
  };
  function buildWaterCharts() {
    function build(labels, axisLabel, locale) {
      var cfg = {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: [755000, 14000000],
            backgroundColor: [C.hyperscaler, C.spec],
            barPercentage: 0.6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: { top: 24 } },
          scales: {
            y: { title: { display: true, text: axisLabel }, beginAtZero: true }
          },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.y.toLocaleString(locale) + ' m³'; } } }
          }
        },
        plugins: [valueLabelPlugin]
      };
      return cfg;
    }
    var enChart = mkChart('chart-water', build(['AWS stated', 'Critics estimate'], 'm³ / year', 'en-US'));
    enChart.$labelFmt = function (v) { return v.toLocaleString('en-US') + ' m³'; };
    enChart.update();
    var esChart = mkChart('chart-water-es', build(['Cifra AWS', 'Estimación de críticos'], 'm³ / año', 'es-ES'));
    esChart.$labelFmt = function (v) { return v.toLocaleString('es-ES') + ' m³'; };
    esChart.update();
  }

  // ---- 13. Grid-electricity CO2: location-based range vs market-based ----
  function buildEmissionsCharts(data) {
    function mw(s) { return s.capacity_mw || s.capacity_mw_expanded || s.capacity_mw_max || (s.energy && s.energy.site_demand_mw) || s.capacity_mw_msft_aragon_total; }
    var totalMW = data.sites.reduce(function (a, s) { return a + (mw(s) || 0); }, 0);
    function mt(g) { return totalMW * 8760 * 0.9 * 1000 * g / 1e6 / 1e6; } // annual kWh × g/kWh → t → Mt
    var lo = mt(108), hi = mt(258);
    function build(labels, axis, locale) {
      var cfg = {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: [lo, hi, 0], backgroundColor: [C.spec, C.spec, C.muted], barPercentage: 0.6 }] },
        options: {
          responsive: true, maintainAspectRatio: false, layout: { padding: { top: 24 } },
          scales: { y: { title: { display: true, text: axis }, beginAtZero: true } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.y.toLocaleString(locale, { maximumFractionDigits: 2 }) + ' Mt'; } } }
          }
        },
        plugins: [valueLabelPlugin]
      };
      return cfg;
    }
    var en = mkChart('chart-emissions', build(['Physical grid (108 g)', 'Official label (258 g)', 'After renewable PPAs'], 'Mt CO₂ / year', 'en-US'));
    en.$labelFmt = function (v) { return v.toLocaleString('en-US', { maximumFractionDigits: 1 }) + ' Mt'; }; en.update();
    var es = mkChart('chart-emissions-es', build(['Red física (108 g)', 'Etiqueta oficial (258 g)', 'Tras PPAs renovables'], 'Mt CO₂ / año', 'es-ES'));
    es.$labelFmt = function (v) { return v.toLocaleString('es-ES', { maximumFractionDigits: 1 }) + ' Mt'; }; es.update();
  }

  // ---- 3. Speculative pipeline MW ----
  function buildSpeculativeCharts(data) {
    var confirmed = 0;
    var speculative = 0;
    var detail = { confirmed: [], speculative: [] };
    data.sites.forEach(function (s) {
      if (s.status === 'withdrawn') return;
      var mw = s.capacity_mw || s.capacity_mw_initial || s.capacity_mw_max || (s.energy && s.energy.site_demand_mw);
      if (!mw) return;
      if (s.speculative) { speculative += mw; detail.speculative.push([s.site_name, mw]); }
      else { confirmed += mw; detail.confirmed.push([s.site_name, mw]); }
    });
    var total = confirmed + speculative;
    var pctSpec = total > 0 ? Math.round(speculative / total * 100) : 0;

    var noteEn = 'Of ' + Math.round(total).toLocaleString('en-US') + ' MW of disclosed per-site capacity, ' + Math.round(speculative).toLocaleString('en-US') + ' MW (' + pctSpec + '%) is speculative. AWS aggregate capacity is not disclosed per site and is excluded from this comparison.';
    var noteEs = 'De ' + Math.round(total).toLocaleString('es-ES') + ' MW de capacidad divulgada por sitio, ' + Math.round(speculative).toLocaleString('es-ES') + ' MW (' + pctSpec + '%) es especulativa. La capacidad agregada de AWS no se divulga por sitio y se excluye de esta comparación.';
    document.getElementById('speculative-note').textContent = noteEn;
    document.getElementById('speculative-note-es').textContent = noteEs;

    var cfg = function () {
      return {
        type: 'doughnut',
        data: {
          labels: ['Anchor tenant confirmed', 'Speculative (no anchor)'],
          datasets: [{
            data: [confirmed, speculative],
            backgroundColor: [C.hyperscaler, C.spec]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { callbacks: { label: function (ctx) { return ctx.label + ': ' + Math.round(ctx.parsed).toLocaleString() + ' MW'; } } }
          }
        }
      };
    };
    mkChart('chart-speculative', cfg());
    var esCfg = cfg();
    esCfg.data.labels = ['Cliente principal confirmado', 'Especulativo (sin cliente)'];
    mkChart('chart-speculative-es', esCfg);
  }

  // ---- 4. Investment by operator type ----
  function buildInvestmentCharts(data) {
    // Explicit typed buckets so we can force AWS aggregate into hyperscaler bucket.
    var buckets = {
      hyperscaler: 0,
      private_equity: 0,
      colocation_reit: 0,
      spanish_independent: 0,
      renewable_developer: 0,
      speculative_developer: 0
    };

    // AWS aggregate (per dataset) — allocate to hyperscaler
    var awsTotal = (data.aggregate && data.aggregate.aws_aragon_investment_total) || 33700;
    buckets.hyperscaler += awsTotal;

    // Microsoft: use aggregate 5356 if present; else sum per-site
    var msSites = data.sites.filter(function (s) { return s.operator === 'Microsoft' && s.investment_eur_million; });
    var msTotal = msSites.reduce(function (a, s) { return a + s.investment_eur_million; }, 0);
    buckets.hyperscaler += msTotal;

    data.sites.forEach(function (s) {
      if (s.operator === 'AWS' || s.operator === 'Microsoft') return; // already counted
      if (s.status === 'withdrawn') return;
      var v = s.investment_eur_million || s.investment_eur_million_phase1 || s.investment_eur_million_full || 0;
      if (!v) return;
      if (buckets[s.operator_type] != null) buckets[s.operator_type] += v;
    });

    var labelsEn = {
      hyperscaler: 'Hyperscaler', private_equity: 'Private equity', colocation_reit: 'Colocation / REIT',
      spanish_independent: 'Spanish independent', renewable_developer: 'Renewable developer',
      speculative_developer: 'Speculative developer'
    };
    var labelsEs = {
      hyperscaler: 'Hyperscaler', private_equity: 'Capital privado', colocation_reit: 'Colocation / SOCIMI',
      spanish_independent: 'Independiente español', renewable_developer: 'Promotor renovable',
      speculative_developer: 'Promotor especulativo'
    };
    var colors = {
      hyperscaler: C.hyperscaler, private_equity: C.pe, colocation_reit: C.colo,
      spanish_independent: C.ind, renewable_developer: C.renewable, speculative_developer: C.spec
    };

    var order = ['hyperscaler', 'private_equity', 'colocation_reit', 'spanish_independent', 'renewable_developer', 'speculative_developer']
      .filter(function (k) { return buckets[k] > 0; });

    function build(labels) {
      return {
        type: 'bar',
        data: {
          labels: order.map(function (k) { return labels[k]; }),
          datasets: [{
            label: '€M',
            data: order.map(function (k) { return buckets[k]; }),
            backgroundColor: order.map(function (k) { return colors[k]; })
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { title: { display: true, text: '€M' } } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return '€' + Math.round(ctx.parsed.x).toLocaleString() + ' M'; } } }
          }
        }
      };
    }
    mkChart('chart-investment', build(labelsEn));
    mkChart('chart-investment-es', build(labelsEs));
  }

  // ---- 5. Site status pipeline ----
  function buildStatusCharts(data) {
    var order = ['operational', 'under_construction', 'permitted', 'announced', 'exploratory', 'withdrawn'];
    var counts = {};
    order.forEach(function (k) { counts[k] = 0; });
    data.sites.forEach(function (s) { if (counts[s.status] != null) counts[s.status] += 1; });

    var labelsEn = {
      operational: 'Operational', under_construction: 'Under construction', permitted: 'Permitted',
      announced: 'Announced', exploratory: 'Exploratory', withdrawn: 'Withdrawn'
    };
    var labelsEs = {
      operational: 'Operativo', under_construction: 'En construcción', permitted: 'Autorizado',
      announced: 'Anunciado', exploratory: 'Exploratorio', withdrawn: 'Retirado'
    };
    var colors = {
      operational: '#2da44e', under_construction: '#1f6feb', permitted: '#b87a00',
      announced: '#8b949e', exploratory: '#d0d7de', withdrawn: '#cf222e'
    };
    var keys = order.filter(function (k) { return counts[k] > 0; });

    function build(labels) {
      return {
        type: 'bar',
        data: {
          labels: keys.map(function (k) { return labels[k]; }),
          datasets: [{
            data: keys.map(function (k) { return counts[k]; }),
            backgroundColor: keys.map(function (k) { return colors[k]; })
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { title: { display: true, text: 'Sites' }, ticks: { stepSize: 1 } } },
          plugins: { legend: { display: false } }
        }
      };
    }
    mkChart('chart-status', build(labelsEn));
    mkChart('chart-status-es', build(labelsEs));
  }

  // ---- 6. Heat cluster (donut) ----
  function buildHeatClusterCharts() {
    function build(useEs) {
      return {
        type: 'doughnut',
        data: {
          labels: useEs ? ['Siglo XXI', 'Siglo XX'] : ['21st century', '20th century'],
          datasets: [{
            data: [9, 1],
            backgroundColor: [C.spec, '#c9d0d8']
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { callbacks: { label: function (ctx) { return ctx.label + ': ' + ctx.parsed + (useEs ? ' de 10' : ' of 10'); } } }
          }
        }
      };
    }
    mkChart('chart-heat-cluster', build(false));
    mkChart('chart-heat-cluster-es', build(true));
  }

  // ---- 7. Zaragoza heat records ----
  function buildHeatRecordsCharts() {
    var rowsEn = [
      { label: '1981-2010 annual mean',              value: 15.0, color: '#c9d0d8' },
      { label: '2022 annual mean (hottest year)',    value: 17.6, color: C.pe },
      { label: 'First tropical night, 23 Aug 2023',  value: 25.7, color: C.hyperscaler },
      { label: 'All-time record, 26 Aug 2010',       value: 42.8, color: C.spec },
      { label: 'June 2026 projected peak',           value: 43.0, color: C.spec }
    ];
    var rowsEs = [
      { label: 'Media anual normal 1981-2010',                  value: 15.0, color: '#c9d0d8' },
      { label: 'Media anual 2022 (año más cálido)',              value: 17.6, color: C.pe },
      { label: 'Primera noche tórrida, 23 ago 2023',              value: 25.7, color: C.hyperscaler },
      { label: 'Récord absoluto, 26 ago 2010',                    value: 42.8, color: C.spec },
      { label: 'Pico proyectado junio 2026',                       value: 43.0, color: C.spec }
    ];
    function build(rows) {
      return {
        type: 'bar',
        data: {
          labels: rows.map(function (r) { return r.label; }),
          datasets: [{
            label: '°C',
            data: rows.map(function (r) { return r.value; }),
            backgroundColor: rows.map(function (r) { return r.color; })
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { title: { display: true, text: '°C' } } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.x.toFixed(1) + '°C'; } } }
          }
        }
      };
    }
    mkChart('chart-heat-records', build(rowsEn));
    mkChart('chart-heat-records-es', build(rowsEs));
  }

  // ---- 8. Comparison: Aragón vs other clusters ----
  function buildComparisonCharts() {
    // Curated benchmarks. Numbers approximate for the European "operational" cluster figures
    // (industry-report consensus H1-H2 2025). All figures cited beneath the chart.
    var rows = [
      { label: 'Aragón (announced pipeline)',       labelEs: 'Aragón (pipeline anunciado)',       value: 11237, color: C.spec },
      { label: 'N. Virginia (planned)',              labelEs: 'N. Virginia (planificado)',          value: 24103, color: '#8b949e' },
      { label: 'N. Virginia (operational H1 2025)',  labelEs: 'N. Virginia (operativo H1 2025)',    value: 6247,  color: '#8b949e' },
      { label: 'Frankfurt (operational, approx.)',   labelEs: 'Frankfurt (operativo, aprox.)',      value: 1200,  color: C.hyperscaler },
      { label: 'London (operational H1 2025)',        labelEs: 'Londres (operativo H1 2025)',        value: 1189,  color: C.hyperscaler },
      { label: 'Dublin (operational H1 2025)',        labelEs: 'Dublín (operativo H1 2025)',         value: 1150,  color: C.hyperscaler },
      { label: 'Amsterdam (operational, approx.)',    labelEs: 'Ámsterdam (operativo, aprox.)',      value: 600,   color: C.hyperscaler },
      { label: 'Madrid (operational, approx.)',       labelEs: 'Madrid (operativo, aprox.)',         value: 200,   color: C.ind }
    ];
    function build(useEs) {
      return {
        type: 'bar',
        data: {
          labels: rows.map(function (r) { return useEs ? r.labelEs : r.label; }),
          datasets: [{
            label: 'MW',
            data: rows.map(function (r) { return r.value; }),
            backgroundColor: rows.map(function (r) { return r.color; })
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { title: { display: true, text: 'MW' } } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return Math.round(ctx.parsed.x).toLocaleString() + ' MW'; } } }
          }
        }
      };
    }
    mkChart('chart-comparison', build(false));
    mkChart('chart-comparison-es', build(true));
  }

  // ---- 9. Waste heat rejected per site: IT + cooling overhead ----
  // Per-operator PUE assumptions. Free-cooling ("water-free") gets a higher PUE
  // because chillers run more often during Ebro heatwaves.
  function pueForSite(s) {
    var op = s.operator;
    var tech = ((s.water && s.water.cooling_tech) || '').toLowerCase();
    if (tech.indexOf('water-free') >= 0 || tech.indexOf('free-cool') >= 0 || tech.indexOf('free cool') >= 0) return 1.35;
    if (op === 'AWS' || op === 'Microsoft') return 1.20;
    if (s.operator_type === 'colocation_reit') return 1.25;
    if (s.operator_type === 'renewable_developer') return 1.30;
    if (s.operator_type === 'private_equity') return 1.30;
    return 1.25;
  }
  function buildWasteHeatCharts(data) {
    var rows = [];
    (data.sites || []).forEach(function (s) {
      if (s.status === 'withdrawn') return;
      var mw = s.capacity_mw || s.capacity_mw_initial || s.capacity_mw_max || s.capacity_mw_expanded || (s.energy && s.energy.site_demand_mw);
      if (!mw) return;
      var pue = pueForSite(s);
      // TJ/year = MW * 8760 * 3.6 / 1000
      var itTj = mw * 8760 * 3.6 / 1000;
      var overheadTj = itTj * (pue - 1);
      rows.push({ label: s.site_name, itTj: itTj, overheadTj: overheadTj, pue: pue });
    });
    rows.sort(function (a, b) { return (b.itTj + b.overheadTj) - (a.itTj + a.overheadTj); });
    var top = rows.slice(0, 12);

    function build(useEs) {
      return {
        type: 'bar',
        data: {
          labels: top.map(function (r) { return r.label; }),
          datasets: [
            {
              label: useEs ? 'Carga TI (calor)' : 'IT load (heat)',
              data: top.map(function (r) { return Math.round(r.itTj); }),
              backgroundColor: C.hyperscaler,
              stack: 'x'
            },
            {
              label: useEs ? 'Sobrecarga de refrigeración' : 'Cooling overhead',
              data: top.map(function (r) { return Math.round(r.overheadTj); }),
              backgroundColor: C.spec,
              stack: 'x'
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: {
            x: { stacked: true, title: { display: true, text: 'TJ / ' + (useEs ? 'año' : 'year') } },
            y: { stacked: true }
          },
          plugins: {
            legend: { position: 'bottom' },
            tooltip: {
              callbacks: {
                label: function (ctx) { return ctx.dataset.label + ': ' + Math.round(ctx.parsed.x).toLocaleString() + ' TJ'; },
                afterLabel: function (ctx) {
                  var idx = ctx.dataIndex;
                  if (ctx.datasetIndex === 1) {
                    return 'PUE = ' + top[idx].pue.toFixed(2);
                  }
                  return '';
                }
              }
            }
          }
        }
      };
    }
    mkChart('chart-waste-heat', build(false));
    mkChart('chart-waste-heat-es', build(true));
  }

  // ---- 10. Cooling technology breakdown ----
  function buildCoolingCharts(data) {
    // Bucket disclosed MW by cooling technology keyword.
    var buckets = { evaporative: 0, closed_loop: 0, free_cooling: 0, immersion: 0, undisclosed: 0 };
    (data.sites || []).forEach(function (s) {
      if (s.status === 'withdrawn') return;
      var mw = s.capacity_mw || s.capacity_mw_initial || s.capacity_mw_max || s.capacity_mw_expanded || (s.energy && s.energy.site_demand_mw);
      if (!mw) return;
      var tech = ((s.water && s.water.cooling_tech) || '').toLowerCase();
      if (tech.indexOf('evapor') >= 0) buckets.evaporative += mw;
      else if (tech.indexOf('closed') >= 0 || tech.indexOf('low-water') >= 0) buckets.closed_loop += mw;
      else if (tech.indexOf('water-free') >= 0 || tech.indexOf('free-cool') >= 0 || tech.indexOf('free cool') >= 0) buckets.free_cooling += mw;
      else if (tech.indexOf('immers') >= 0) buckets.immersion += mw;
      else buckets.undisclosed += mw;
    });

    var order = ['evaporative', 'closed_loop', 'free_cooling', 'immersion', 'undisclosed'];
    var labelsEn = { evaporative: 'Evaporative (highest water)', closed_loop: 'Closed-loop (low water)', free_cooling: 'Free-cooling / water-free', immersion: 'Immersion', undisclosed: 'Undisclosed' };
    var labelsEs = { evaporative: 'Evaporativa (más agua)', closed_loop: 'Circuito cerrado (poca agua)', free_cooling: 'Free-cooling / sin agua', immersion: 'Inmersión', undisclosed: 'No divulgado' };
    var colors = { evaporative: C.spec, closed_loop: C.hyperscaler, free_cooling: C.renewable, immersion: C.colo, undisclosed: '#c9d0d8' };

    function build(labels) {
      var keys = order.filter(function (k) { return buckets[k] > 0; });
      return {
        type: 'bar',
        data: {
          labels: keys.map(function (k) { return labels[k]; }),
          datasets: [{
            data: keys.map(function (k) { return Math.round(buckets[k]); }),
            backgroundColor: keys.map(function (k) { return colors[k]; })
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          indexAxis: 'y',
          scales: { x: { title: { display: true, text: 'MW' } } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return Math.round(ctx.parsed.x).toLocaleString() + ' MW'; } } }
          }
        }
      };
    }
    mkChart('chart-cooling', build(labelsEn));
    mkChart('chart-cooling-es', build(labelsEs));
  }

  // ---- 11. Hottest summers by decade (top 10) ----
  function buildSummersDecadeCharts() {
    // AEMET rankings distribute the top 10 heavily to recent decades.
    // Confirmed cited: 2025 (#1), 2022 (#2), 2023 (#4), 2024 (#7), 2003 (top 10, previously #1).
    // Remaining slots allocated to 2010s (well-documented: 2015, 2017, 2019 warm) and one 1990s entry
    // per AEMET seasonal review series.
    var perDecade = { '1980s': 0, '1990s': 1, '2000s': 1, '2010s': 3, '2020s': 5 };
    function build(useEs) {
      var labels = Object.keys(perDecade);
      if (useEs) labels = labels.map(function (l) { return l.replace('1980s', 'Años 1980').replace('1990s', 'Años 1990').replace('2000s', 'Años 2000').replace('2010s', 'Años 2010').replace('2020s', 'Años 2020'); });
      return {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: Object.values(perDecade),
            backgroundColor: [
              '#c9d0d8', '#c9d0d8', C.pe, C.pe, C.spec
            ]
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, title: { display: true, text: useEs ? 'Nº de veranos en el top 10' : 'Summers in top 10' }, ticks: { stepSize: 1 } }
          },
          plugins: { legend: { display: false } }
        }
      };
    }
    mkChart('chart-summers-decade', build(false));
    mkChart('chart-summers-decade-es', build(true));
  }

  // ---- 12. Cumulative committed water demand vs drought years ----
  // Editorial framing: what water the Aragón government authorised while the basin
  // was in drought emergency. Two cumulative lines (company vs critics estimates)
  // because the AWS water figure itself is disputed.
  function buildDroughtCharts(data) {
    var startYear = 2020, endYear = 2026;
    var years = [];
    for (var y = startYear; y <= endYear; y++) years.push(y);

    // CHE drought severity per year: 'extreme' (basin-wide), 'localised' (specific sub-basins), or absent.
    // 2021-2023 = basin-wide extreme drought (Plan Especial de Sequías 2023, eldiario.es).
    // 2024 = localised extraordinary drought in UTE 06 Huerva + UTE 09A Guadalope, 13 Jun–8 Oct 2024 (CHE resolution).
    // 2025-2026 = normal/near-normal, only Ésera sub-basin in prealerta by mid-2026 (El Español, CHE).
    var droughtYears = { 2021: 'extreme', 2022: 'extreme', 2023: 'extreme', 2024: 'localised' };

    // Water attribution per authorisation year.
    // Company-stated (AWS aggregate 755,000 m³ split by permit-year footprint):
    //   2021 (initial PIGA + 3 sites live 2022): ~200,000 m³
    //   2024 (Microsoft PIGA declared; Villamayor site — MSFT water undisclosed, minimal committed here): ~50,000 m³
    //   2025 (INAGA EIA exemption + Vantage/Azora + AWS expansion + La Puebla de Híjar 350k m³): ~500,000 m³
    //   2026 (3rd partial AWS approval + finalisations): remaining
    //   Total by end 2026 = 755,000 m³ (AWS aggregate)
    var companyIncremental = { 2020: 0, 2021: 200000, 2022: 0, 2023: 0, 2024: 50000, 2025: 405000, 2026: 100000 };

    // Critics' ~14 hm³/year estimate scaled proportionally (18.5× the company figure).
    var criticsIncremental = { 2020: 0, 2021: 3700000, 2022: 0, 2023: 0, 2024: 925000, 2025: 7500000, 2026: 1875000 };

    var companyCumulative = [], criticsCumulative = [];
    var cSum = 0, kSum = 0;
    years.forEach(function (y) {
      cSum += (companyIncremental[y] || 0);
      kSum += (criticsIncremental[y] || 0);
      companyCumulative.push(cSum);
      criticsCumulative.push(kSum);
    });

    // Custom plugin: shade drought-year x-bands behind the chart, differentiated by severity.
    var droughtShadePlugin = {
      id: 'droughtShadePlugin',
      beforeDatasetsDraw: function (chart) {
        var ctx = chart.ctx;
        var xAxis = chart.scales.x;
        var yAxis = chart.scales.y;
        if (!xAxis || !yAxis) return;
        ctx.save();
        years.forEach(function (y) {
          var sev = droughtYears[y];
          if (!sev) return;
          ctx.fillStyle = sev === 'extreme' ? 'rgba(207, 34, 46, 0.22)' : 'rgba(207, 34, 46, 0.10)';
          var half = (xAxis.width / (years.length)) / 2;
          var xCenter = xAxis.getPixelForValue(String(y));
          ctx.fillRect(xCenter - half, yAxis.top, half * 2, yAxis.bottom - yAxis.top);
        });
        ctx.restore();
      }
    };

    function build(useEs) {
      return {
        type: 'line',
        data: {
          labels: years.map(function (y) { return String(y); }),
          datasets: [
            {
              label: useEs ? 'Estimación críticos (acumulada)' : 'Critics estimate (cumulative)',
              data: criticsCumulative,
              borderColor: C.spec,
              backgroundColor: 'rgba(207, 34, 46, 0.10)',
              fill: false,
              tension: 0.15,
              borderWidth: 2.5,
              pointRadius: 4,
              pointBackgroundColor: C.spec
            },
            {
              label: useEs ? 'Cifra empresa AWS (acumulada)' : 'Company figure (cumulative)',
              data: companyCumulative,
              borderColor: C.hyperscaler,
              backgroundColor: 'rgba(31, 111, 235, 0.10)',
              fill: false,
              tension: 0.15,
              borderWidth: 2.5,
              pointRadius: 4,
              pointBackgroundColor: C.hyperscaler
            },
            // Phantom datasets for the legend-only swatches. Data is all null so nothing
            // renders on the chart; only the color-swatch label appears in the legend.
            {
              label: useEs ? 'Sequía extrema CHE (cuenca)' : 'Extreme drought CHE (basin-wide)',
              data: [null, null, null, null, null, null, null],
              backgroundColor: 'rgba(207, 34, 46, 0.22)',
              borderColor: 'rgba(207, 34, 46, 0)',
              pointRadius: 0,
              showLine: false,
              fill: true
            },
            {
              label: useEs ? 'Sequía localizada CHE (subcuencas)' : 'Localised drought CHE (sub-basins)',
              data: [null, null, null, null, null, null, null],
              backgroundColor: 'rgba(207, 34, 46, 0.10)',
              borderColor: 'rgba(207, 34, 46, 0)',
              pointRadius: 0,
              showLine: false,
              fill: true
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, title: { display: true, text: useEs ? 'Agua comprometida acumulada (m³/año)' : 'Cumulative committed water (m³/yr)' } },
            x: { title: { display: true, text: useEs ? 'Año de autorización' : 'Year of authorisation' } }
          },
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                generateLabels: function (chart) {
                  var labels = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                  // For the phantom drought entries, force the legend color box to use the fill color.
                  labels.forEach(function (l, i) {
                    if (i >= 2) {
                      l.fillStyle = chart.data.datasets[i].backgroundColor;
                      l.strokeStyle = chart.data.datasets[i].backgroundColor;
                      l.lineWidth = 0;
                    }
                  });
                  return labels;
                }
              }
            },
            tooltip: {
              filter: function (item) { return item.datasetIndex < 2; },
              callbacks: { label: function (ctx) { return ctx.dataset.label + ': ' + Math.round(ctx.parsed.y).toLocaleString() + ' m³/yr'; } }
            }
          }
        },
        plugins: [droughtShadePlugin]
      };
    }
    mkChart('chart-drought', build(false));
    mkChart('chart-drought-es', build(true));
  }

  var COLORS_MAP = {
    hyperscaler: C.hyperscaler,
    private_equity: C.pe,
    colocation_reit: C.colo,
    spanish_independent: C.ind,
    renewable_developer: C.renewable,
    speculative_developer: C.spec
  };
})();
</script>
<script src="content.js"></script>
