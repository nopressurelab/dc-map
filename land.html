<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Land &amp; biodiversity, Aragón Datacenter Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="about-body" data-page="land">
<header class="about-header">
  <div class="about-header-inner">
    <a href="index.html" class="back-link">← Back to map</a>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</header>

<main class="about-main">
  <div id="content"><p class="lede">Loading…</p></div>
  <noscript><p class="lede">This page's text is in <code>content/land.en.md</code> / <code>content/land.es.md</code>. Enable JavaScript, or read those files directly.</p></noscript>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<script>
// Fills the footprint chart + hectares table (placeholders live in content/land.<lang>.md).
(function () {
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif";
  Chart.defaults.font.size = 12;
  Chart.defaults.color = '#1a1f24';
  var C = { pe: '#b87a00' };
  var data = null, landChart = null, curLang = 'en', rendered = false;

  function fill() {
    if (!data || !rendered) return;
    var lang = curLang, locale = lang === 'es' ? 'es-ES' : 'en-US';
    var rows = data.sites.filter(function (s) { return s.land && s.land.hectares; })
      .map(function (s) { return { short: s.site_name.replace(/\s*\(.*$/, '').replace(/\s+—.*$/, ''), full: s.site_name, ha: s.land.hectares, src: s.land._source }; })
      .sort(function (a, b) { return b.ha - a.ha; });
    var canvas = document.getElementById('chart-land');
    if (canvas) {
      if (landChart) { landChart.destroy(); landChart = null; }
      landChart = new Chart(canvas, {
        type: 'bar',
        data: { labels: rows.map(function (r) { return r.short; }), datasets: [{ data: rows.map(function (r) { return r.ha; }), backgroundColor: C.pe, barPercentage: 0.75 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: lang === 'es' ? 'hectáreas' : 'hectares' }, beginAtZero: true } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.x.toLocaleString(locale) + ' ha'; } } } } }
      });
    }
    var tb = document.getElementById('land-table-body');
    if (tb) tb.innerHTML = rows.map(function (r) {
      var src = r.src ? '<a target="_blank" rel="noopener" href="' + r.src + '">' + (lang === 'es' ? 'fuente' : 'source') + '</a>' : '—';
      return '<tr><td>' + r.full + '</td><td>' + r.ha.toLocaleString(locale) + ' ha</td><td>' + src + '</td></tr>';
    }).join('');
  }

  window.onContentRender = function (lang) { curLang = lang; rendered = true; fill(); };
  fetch('data/datacenters.json').then(function (r) { return r.json(); }).then(function (d) { data = d; fill(); }).catch(function () {});
})();
</script>
<script src="content.js"></script>
</body>
</html>
