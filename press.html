<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For press, Aragón Datacenter Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="about-body" data-page="press">
<header class="about-header">
  <div class="about-header-inner">
    <a href="index.html" class="back-link">← Back to map</a>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</header>

<main class="about-main">
  <div id="content"><p class="lede">Loading…</p></div>
  <noscript><p class="lede">This page's text is in <code>content/press.en.md</code> / <code>content/press.es.md</code>. Enable JavaScript, or read those files directly.</p></noscript>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
// CSV export — generated live from the JSON. Uses event delegation so it works with the
// download button injected by the Markdown content.
(function () {
  var CSV_FIELDS = [
    'id', 'operator', 'operator_entity', 'operator_type',
    'site_name', 'municipality', 'province', 'lat', 'lon',
    'coords_precision', 'status', 'first_announced',
    'operational_date', 'construction_start',
    'investment_eur_million', 'capacity_mw',
    'tenant_status', 'speculative',
    'uses_piga', 'icio_exempt_via_piga',
    'has_litigation', 'has_tax_dispute', 'has_scandal',
    'grid_connection', 'cooling_tech', 'water_body',
    'sources_count', 'first_source'
  ];
  function pickInvestment(s) { return s.investment_eur_million || s.investment_eur_million_phase1 || s.investment_eur_million_full || ''; }
  function pickCapacity(s) { return s.capacity_mw || s.capacity_mw_initial || s.capacity_mw_max || s.capacity_mw_expanded || (s.energy && s.energy.site_demand_mw) || ''; }
  function csvEscape(v) {
    if (v == null) return '';
    var s = String(v);
    if (s.indexOf(',') === -1 && s.indexOf('"') === -1 && s.indexOf('\n') === -1) return s;
    return '"' + s.replace(/"/g, '""') + '"';
  }
  function buildCsv(data) {
    var rows = [CSV_FIELDS.join(',')];
    (data.sites || []).forEach(function (s) {
      var ei = s.expedited_indicators || {};
      var water = s.water || {};
      var energy = s.energy || {};
      var sources = s.sources || [];
      var row = {
        id: s.id, operator: s.operator, operator_entity: s.operator_entity,
        operator_type: s.operator_type, site_name: s.site_name,
        municipality: s.municipality, province: s.province,
        lat: s.lat, lon: s.lon, coords_precision: s.coords_precision,
        status: s.status, first_announced: s.first_announced,
        operational_date: s.operational_date, construction_start: s.construction_start,
        investment_eur_million: pickInvestment(s),
        capacity_mw: pickCapacity(s),
        tenant_status: s.tenant_status,
        speculative: s.speculative === true ? 'true' : (s.speculative === false ? 'false' : ''),
        uses_piga: ei.uses_piga === true ? 'true' : (ei.uses_piga === false ? 'false' : (ei.uses_piga || '')),
        icio_exempt_via_piga: ei.icio_exempt_via_piga === true ? 'true' : (ei.icio_exempt_via_piga || ''),
        has_litigation: (ei.litigation && ei.litigation.length) ? 'true' : 'false',
        has_tax_dispute: ei.tax_dispute ? 'true' : 'false',
        has_scandal: ei.scandal ? 'true' : 'false',
        grid_connection: energy.grid_connection,
        cooling_tech: water.cooling_tech,
        water_body: water.source_water_body,
        sources_count: sources.length,
        first_source: sources[0] || ''
      };
      rows.push(CSV_FIELDS.map(function (f) { return csvEscape(row[f]); }).join(','));
    });
    return rows.join('\n') + '\n';
  }
  document.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('[data-csv]') : null;
    if (!btn) return;
    fetch('data/datacenters.json').then(function (r) { return r.json(); }).then(function (data) {
      var csv = buildCsv(data);
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'datacenters.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 100);
    });
  });
})();
</script>
<script src="content.js"></script>
</body>
</html>
